# Bài 91: Nginx Reverse Proxy cho Node.js trên VPS
# Copy file này: sudo cp 91/nginx.conf /etc/nginx/sites-available/nodejs-app
# Enable: sudo ln -s /etc/nginx/sites-available/nodejs-app /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# SSL Let's Encrypt:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

# Upstream — Node.js app chạy bằng PM2 trên port 3000
upstream nodejs_backend {
    # least_conn: phân tải request tới worker ít tải nhất
    least_conn;
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    # Scale thêm instance khi cần:
    # server 127.0.0.1:3001 weight=1;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Client body size — upload file
    client_max_body_size 10M;

    # Access log
    access_log /var/log/nginx/nodejs-app.access.log;
    error_log  /var/log/nginx/nodejs-app.error.log warn;

    # Proxy tất cả request tới Node.js
    location / {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;

        # Headers cần thiết cho Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeout — phù hợp API thường và long-polling
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint — Nginx tự check, không qua Node
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static files — serve trực tiếp từ Nginx (nhanh hơn Node)
    location /static/ {
        alias /var/www/nodejs-app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
